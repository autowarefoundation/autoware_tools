/**:
  ros__parameters:
    # Evaluation Mode
    # Options: "open_loop"
    evaluation:
      mode: "open_loop"

    # Evaluation Timing Configuration
    evaluation_interval_ms: 100.0  # Interval for sampling kinematic states (milliseconds)
    sync_tolerance_ms: 100.0  # Tolerance for time synchronization (milliseconds)

    # Memory Management Configuration
    buffer_duration_sec: 20.0  # Buffer duration in seconds
    max_buffer_messages: 10000  # Maximum messages per buffer

    # Input / Ouput Configuration
    input_bag_path: ""
    output_dir: ""

    # Topic Name Configuration
    map_topic: "/map/vector_map"
    map_marker_array: "/map/vector_map_marker"
    route_topic: "/planning/mission_planning/route"
    odometry_topic: "/localization/kinematic_state"
    trajectory_topic: "/planning/trajectory"
    candidate_trajectories_topic: "/diffusion_planner/output/trajectories"
    objects_topic: "/perception/object_recognition/objects"
    traffic_signals_topic: "/perception/traffic_light_recognition/traffic_signals"
    tf_topic: "/tf"
    acceleration_topic: "/localization/acceleration"
    steering_topic: "/vehicle/status/steering_status"

    open_loop:
      # "kinematic_state" (default): synthesize GT from odometry topic
      # "gt_trajectory": use pre-generated GT trajectory topic directly
      gt_source_mode: "kinematic_state"
      gt_trajectory_topic: "/planning/ground_truth_trajectory"
      gt_sync_tolerance_ms: 200.0
      hc:
        # NAVSIM-aligned default thresholds for the History Comfort (HC) subscore.
        finite_difference_epsilon: 0.001
        max_longitudinal_acceleration: 2.40
        min_longitudinal_acceleration: -4.05
        max_lateral_acceleration: 4.89
        max_jerk_magnitude: 8.37
        max_longitudinal_jerk: 4.13
        max_yaw_rate: 0.95
        max_yaw_acceleration: 1.93
      metric_variant: ""
      # DLR result horizon checkpoints in seconds.
      # ADE/FDE are reported at these horizons plus "full" (entire trajectory).
      # Trajectories shorter than a horizon are excluded from that horizon with 0.1s tolerance.
      evaluation_horizons: [1.0, 2.0, 4.0, 8.0]
      extended_comfort:
        max_acceleration_rms: 0.7  # Maximum RMS acceleration discrepancy between consecutive plans [m/s^2]
        max_jerk_rms: 0.5  # Maximum RMS jerk discrepancy between consecutive plans [m/s^3]
        max_yaw_rate_rms: 0.1  # Maximum RMS yaw-rate discrepancy between consecutive plans [rad/s]
        max_yaw_acceleration_rms: 0.1  # Maximum RMS yaw-acceleration discrepancy between consecutive plans [rad/s^2]
        finite_difference_epsilon: 0.001  # Minimum delta time used for EC finite differences [s]
      lane_keep:
        max_lateral_deviation: 0.5  # Maximum absolute lateral deviation allowed for LK [m]
        max_continuous_violation_time: 2.0  # Continuous over-threshold duration allowed for LK [s]
